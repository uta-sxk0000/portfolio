<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Elevator controller simulator illustration</title>
  <desc id="desc">A dark elevator shaft and control panel representing a C simulator.</desc>
  <defs>
