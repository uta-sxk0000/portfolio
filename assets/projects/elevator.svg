  <text x="642" y="146" fill="#F8FAFC" font-family="Inter, Arial" font-size="30" font-weight="900">CTRL</text>
  <text x="642" y="182" fill="#A8B3C7" font-family="JetBrains Mono, Consolas" font-size="18">state: MOVING</text>
  <g fill="#1F2937" stroke="#FFFFFF" stroke-opacity=".12">
