      <stop offset="0" stop-color="#0B0F19"/>
      <stop offset="1" stop-color="#18243A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" fill="url(#bg)"/>
  <g opacity=".18" stroke="#94A3B8" stroke-width="1">
    <path d="M160 0v560M320 0v560M480 0v560M640 0v560M800 0v560M0 112h960M0 224h960M0 336h960M0 448h960"/>
